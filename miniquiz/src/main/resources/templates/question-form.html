<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Câu hỏi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 800px; margin: 0 auto;">
            <div class="card-header bg-white">
                <h3 class="mb-0" th:text="${question.id == null} ? 'Thêm câu hỏi mới' : 'Cập nhật câu hỏi'"></h3>
            </div>
            <div class="card-body">
                <form th:action="@{'/admin/quiz/' + ${quizId} + '/question/save'}" th:object="${question}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nội dung câu hỏi</label>
                        <textarea class="form-control" th:field="*{content}" rows="3" required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phương án A</label>
                            <input type="text" class="form-control" th:field="*{optionA}" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phương án B</label>
                            <input type="text" class="form-control" th:field="*{optionB}" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phương án C</label>
                            <input type="text" class="form-control" th:field="*{optionC}" required />
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phương án D</label>
                            <input type="text" class="form-control" th:field="*{optionD}" required />
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-success">Đáp án chính xác</label>
                        <select class="form-select" th:field="*{correctAnswer}" required>
                            <option value="A">Phương án A</option>
                            <option value="B">Phương án B</option>
                            <option value="C">Phương án C</option>
                            <option value="D">Phương án D</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{'/admin/quiz/' + ${quizId} + '/questions'}" class="btn btn-secondary">Hủy bỏ</a>
                        <button type="submit" class="btn btn-success">Lưu câu hỏi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
