<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xem lại bài thi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .correct-ans { background-color: #d1e7dd; border-color: #badbcc; color: #0f5132; padding: 8px; border-radius: 4px; }
        .wrong-ans { background-color: #f8d7da; border-color: #f5c2c7; color: #842029; padding: 8px; border-radius: 4px; }
        .normal-ans { padding: 8px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Mini Quiz Web</a>
            <div class="d-flex">
                <a href="/history" class="btn btn-outline-light me-2">Quay lại lịch sử</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h3 class="text-primary">Kết quả chi tiết</h3>
                <h5 th:text="${result.quiz.title}"></h5>
                <p class="mb-0">Điểm số: <strong th:text="${result.score} + ' câu đúng'"></strong></p>
            </div>
        </div>

        <div class="card shadow-sm mb-4" th:each="ua, iterStat : ${result.userAnswers}">
            <div class="card-header bg-white">
                <strong>Câu <span th:text="${iterStat.count}"></span>: </strong>
                <span th:text="${ua.question.content}"></span>
            </div>
            <div class="card-body">
                <div th:class="${ua.question.correctAnswer == 'A' ? 'correct-ans' : (ua.selectedAnswer == 'A' ? 'wrong-ans' : 'normal-ans')}">
                    A. <span th:text="${ua.question.optionA}"></span>
                    <span th:if="${ua.question.correctAnswer == 'A'}"><strong> (Đáp án đúng)</strong></span>
                    <span th:if="${ua.selectedAnswer == 'A' && ua.question.correctAnswer != 'A'}"><strong> (Bạn chọn sai)</strong></span>
                </div>
                <div th:class="${ua.question.correctAnswer == 'B' ? 'correct-ans' : (ua.selectedAnswer == 'B' ? 'wrong-ans' : 'normal-ans')}" class="mt-2">
                    B. <span th:text="${ua.question.optionB}"></span>
                    <span th:if="${ua.question.correctAnswer == 'B'}"><strong> (Đáp án đúng)</strong></span>
                    <span th:if="${ua.selectedAnswer == 'B' && ua.question.correctAnswer != 'B'}"><strong> (Bạn chọn sai)</strong></span>
                </div>
                <div th:class="${ua.question.correctAnswer == 'C' ? 'correct-ans' : (ua.selectedAnswer == 'C' ? 'wrong-ans' : 'normal-ans')}" class="mt-2">
                    C. <span th:text="${ua.question.optionC}"></span>
                    <span th:if="${ua.question.correctAnswer == 'C'}"><strong> (Đáp án đúng)</strong></span>
                    <span th:if="${ua.selectedAnswer == 'C' && ua.question.correctAnswer != 'C'}"><strong> (Bạn chọn sai)</strong></span>
                </div>
                <div th:class="${ua.question.correctAnswer == 'D' ? 'correct-ans' : (ua.selectedAnswer == 'D' ? 'wrong-ans' : 'normal-ans')}" class="mt-2">
                    D. <span th:text="${ua.question.optionD}"></span>
                    <span th:if="${ua.question.correctAnswer == 'D'}"><strong> (Đáp án đúng)</strong></span>
                    <span th:if="${ua.selectedAnswer == 'D' && ua.question.correctAnswer != 'D'}"><strong> (Bạn chọn sai)</strong></span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
