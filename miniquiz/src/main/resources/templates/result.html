<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết quả bài thi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Mini Quiz Web</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm text-center">
                    <div class="card-body py-5">
                        <h2 class="text-success mb-3">Hoàn thành bài thi!</h2>
                        <h5 class="text-muted mb-4" th:text="${quizTitle}">Tên bài thi</h5>
                        
                        <div class="display-1 text-primary fw-bold mb-4">
                            <span th:text="${score}">0</span> / <span th:text="${totalQuestions}">0</span>
                        </div>
                        
                        <p class="lead">Chúc mừng bạn đã hoàn thành phần thi trắc nghiệm.</p>
                        
                        <div class="mt-4">
                            <a href="/" class="btn btn-primary px-4">Về trang chủ</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
