<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Đề thi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Mini Quiz Admin</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="mb-4">Thêm đề thi mới</h3>
                        <form th:action="@{/admin/quiz/add}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Tên bài thi</label>
                                <input type="text" name="title" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mô tả bài thi</label>
                                <textarea name="description" class="form-control" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Thời gian làm bài (phút)</label>
                                <input type="number" name="timeLimitMinutes" class="form-control" required>
                            </div>
                            <div class="d-flex justify-content-between">
                                <a href="/admin/quizzes" class="btn btn-secondary">Hủy</a>
                                <button type="submit" class="btn btn-success">Lưu lại</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
