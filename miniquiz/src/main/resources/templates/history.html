<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử làm bài</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Mini Quiz Web</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light me-2">Trang chủ</a>
                <a href="/logout" class="btn btn-danger">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h3 class="mb-4">Lịch sử ôn luyện của bạn</h3>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>STT</th>
                            <th>Tên bài thi</th>
                            <th>Điểm số (Câu đúng)</th>
                            <th>Ngày nộp bài</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="res, iterStat : ${results}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${res.quiz.title}"></td>
                            <td><span class="badge bg-success" th:text="${res.score} + ' câu'"></span></td>
                            <td th:text="${#temporals.format(res.dateTaken, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{'/quiz/review/' + ${res.id}}" class="btn btn-sm btn-outline-primary">Xem chi tiết</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div th:if="${#lists.isEmpty(results)}" class="text-center text-muted py-3">
                    Bạn chưa hoàn thành bài thi nào. Hãy ra trang chủ và bắt đầu ôn tập nhé!
                </div>
            </div>
        </div>
    </div>

</body>
</html>
