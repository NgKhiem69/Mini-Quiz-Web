<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${quiz.title}">Làm bài thi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Mini Quiz Web</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h3 class="text-primary" th:text="${quiz.title}">Tên đề thi</h3>
                <p class="text-muted" th:text="${quiz.description}">Mô tả</p>
                <span class="badge bg-warning text-dark">Thời gian: <span th:text="${quiz.timeLimitMinutes}"></span> phút</span>
            </div>
        </div>

        <form th:action="@{'/quiz/' + ${quiz.id} + '/submit'}" method="post">
            
            <div class="card shadow-sm mb-4" th:each="q, iterStat : ${questions}">
                <div class="card-header bg-white">
                    <strong>Câu <span th:text="${iterStat.count}">1</span>: </strong> 
                    <span th:text="${q.content}">Nội dung câu hỏi</span>
                </div>
                <div class="card-body">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" th:name="'question_' + ${q.id}" value="A" required>
                        <label class="form-check-label" th:text="'A. ' + ${q.optionA}"></label>
                    </div>
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="radio" th:name="'question_' + ${q.id}" value="B">
                        <label class="form-check-label" th:text="'B. ' + ${q.optionB}"></label>
                    </div>
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="radio" th:name="'question_' + ${q.id}" value="C">
                        <label class="form-check-label" th:text="'C. ' + ${q.optionC}"></label>
                    </div>
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="radio" th:name="'question_' + ${q.id}" value="D">
                        <label class="form-check-label" th:text="'D. ' + ${q.optionD}"></label>
                    </div>
                </div>
            </div>

            <div class="text-center mb-5">
                <button type="submit" class="btn btn-success btn-lg px-5">Nộp bài ngay</button>
            </div>
        </form>
    </div>

</body>
</html>
