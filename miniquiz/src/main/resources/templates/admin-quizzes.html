<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Đề thi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Mini Quiz Admin</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light me-2">Trang chủ</a>
                <a href="/logout" class="btn btn-danger">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>Danh sách Bộ đề thi</h3>
            <a href="/admin/quiz/add" class="btn btn-primary">Thêm đề thi mới</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên bài thi</th>
                            <th>Mô tả</th>
                            <th>Thời gian (phút)</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="quiz : ${quizzes}">
                            <td th:text="${quiz.id}"></td>
                            <td th:text="${quiz.title}"></td>
                            <td th:text="${quiz.description}"></td>
                            <td th:text="${quiz.timeLimitMinutes}"></td>
                            <td>
                            <a th:href="@{'/admin/quiz/' + ${quiz.id} + '/questions'}" class="btn btn-sm btn-info text-white">Quản lý câu hỏi</a>
                                <a th:href="@{'/admin/quiz/delete/' + ${quiz.id}}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
