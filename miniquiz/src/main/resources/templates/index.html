<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mini Quiz Web - Ôn luyện Tiếng Anh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Mini Quiz Web</a>
        
        <div class="d-flex">
            <th:block th:if="${session.loggedInUser == null}">
                <a href="/login" class="btn btn-outline-light me-2">Đăng nhập</a>
                <a href="/register" class="btn btn-light">Đăng ký</a>
            </th:block>
            
            <th:block th:if="${session.loggedInUser != null}">
    <span class="navbar-text text-white me-3" th:text="'Xin chào, ' + ${session.loggedInUser.username}"></span>
    <a th:if="${session.loggedInUser.role == 'ROLE_ADMIN'}" href="/admin/quizzes" class="btn btn-warning me-2">Quản lý đề thi</a>
    <a href="/history" class="btn btn-info text-white me-2">Lịch sử thi</a>
    <a href="/logout" class="btn btn-danger">Đăng xuất</a>
</th:block>
        </div>
    </div>
    
</nav>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Danh sách Đề thi</h2>
        
        <div class="row">
            <div class="col-md-4 mb-4" th:each="quiz : ${quizzes}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="${quiz.title}">Tên đề thi</h5>
                        <p class="card-text text-muted" th:text="${quiz.description}">Mô tả đề thi</p>
                        <p class="card-text">
                            <strong>Thời gian: </strong> 
                            <span th:text="${quiz.timeLimitMinutes}">0</span> phút
                        </p>
                    </div>
                    <div class="card-footer bg-white border-top-0 text-center">
						<a th:href="@{'/quiz/' + ${quiz.id}}" class="btn btn-outline-success w-100">Bắt đầu thi</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(quizzes)}" class="alert alert-warning text-center">
            Hiện tại chưa có bộ đề thi nào trên hệ thống.
        </div>
    </div>

</body>
</html>
